<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De plons</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      /* Grijs / lichtblauw palet */
      --blue-50:  #eff6fb;
      --blue-100: #dbeaf5;
      --blue-200: #b8d7ea;
      --blue-300: #8fc0dc;
      --blue-500: #5a9bc4;
      --blue-600: #457fa6;
      --blue-700: #35637f;
      --gray-50:  #f7f8f9;
      --gray-100: #eef0f2;
      --gray-200: #dfe3e6;
      --gray-400: #9aa4ac;
      --gray-600: #5c666e;
      --gray-800: #2f363c;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(47, 54, 60, 0.08), 0 4px 14px rgba(47, 54, 60, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, var(--blue-50) 0%, var(--gray-50) 240px);
      color: var(--gray-800);
      min-height: 100vh;
    }
    #root { max-width: 1000px; margin: 0 auto; padding: 0 16px 48px; }

    .app-header { display: flex; align-items: center; gap: 12px; padding: 24px 4px 16px; }
    .app-logo {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--blue-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: var(--shadow);
    }
    .app-title h1 { font-size: 22px; font-weight: 700; color: var(--blue-700); }
    .app-title p { font-size: 13px; color: var(--gray-600); }

    .tab-bar {
      display: flex; gap: 6px;
      background: var(--gray-100);
      border-radius: var(--radius);
      padding: 5px; margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tab-bar button {
      flex: 1; min-width: 110px;
      border: none; cursor: pointer;
      background: transparent; color: var(--gray-600);
      font-size: 14px; font-weight: 600;
      padding: 9px 14px; border-radius: 9px;
      transition: background 0.15s, color 0.15s;
    }
    .tab-bar button:hover { color: var(--blue-700); }
    .tab-bar button.active { background: #fff; color: var(--blue-700); box-shadow: var(--shadow); }

    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    /* ---- Kalender ---- */
    .cal-toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .cal-toolbar .spacer { flex: 1; }
    .cal-title { font-size: 16px; font-weight: 700; color: var(--blue-700); }
    .btn {
      border: 1px solid var(--gray-200);
      background: #fff; color: var(--gray-600);
      border-radius: 9px; padding: 7px 13px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: var(--blue-300); color: var(--blue-700); }
    .btn.primary { background: var(--blue-500); border-color: var(--blue-500); color: #fff; }
    .btn.primary:hover { background: var(--blue-600); }
    .btn.danger:hover { border-color: #d9848c; color: #b04350; }
    .btn.small { padding: 4px 9px; font-size: 12px; }
    select, input[type="text"], input[type="date"] {
      border: 1px solid var(--gray-200);
      border-radius: 9px; padding: 7px 10px;
      font-size: 13px; color: var(--gray-800);
      background: #fff; outline: none;
    }
    select:focus, input[type="text"]:focus { border-color: var(--blue-300); }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .day-col {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 8px;
      min-height: 140px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .day-col:hover { border-color: var(--blue-300); background: var(--blue-50); }
    .day-col.today { border-color: var(--blue-500); background: var(--blue-50); }
    .day-head { text-align: center; margin-bottom: 8px; }
    .day-head .dname { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--gray-400); letter-spacing: 0.04em; }
    .day-head .dnum { font-size: 16px; font-weight: 700; color: var(--gray-800); }
    .day-col.today .day-head .dnum { color: var(--blue-600); }
    .pupil-chip {
      background: #fff;
      border: 1px solid var(--blue-200);
      border-radius: 7px;
      padding: 4px 7px;
      font-size: 12px;
      margin-bottom: 5px;
      color: var(--gray-800);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pupil-chip .lvl { color: var(--blue-600); font-weight: 600; }
    .day-count { font-size: 11px; color: var(--gray-400); text-align: center; margin-top: 4px; }

    /* ---- Modal (dagdetail) ---- */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(47, 54, 60, 0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 16px;
    }
    .modal {
      background: #fff; border-radius: var(--radius);
      box-shadow: 0 10px 40px rgba(47,54,60,0.25);
      max-width: 560px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      padding: 24px;
    }
    .modal h3 { color: var(--blue-700); font-size: 17px; margin-bottom: 4px; }
    .modal .sub { font-size: 13px; color: var(--gray-600); margin-bottom: 16px; }
    .detail-row {
      border: 1px solid var(--gray-200);
      border-radius: 9px; margin-bottom: 8px;
      overflow: hidden;
    }
    .detail-main {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; cursor: pointer; gap: 8px;
    }
    .detail-main:hover { background: var(--gray-50); }
    .detail-row .name { font-weight: 600; font-size: 14px; }
    .detail-row .teacher { font-size: 12px; color: var(--gray-600); }
    .badge {
      background: var(--blue-100); color: var(--blue-700);
      font-size: 12px; font-weight: 600;
      border-radius: 999px; padding: 3px 10px;
      white-space: nowrap;
    }
    .badge.muted { background: var(--gray-100); color: var(--gray-600); }
    .chevron { font-size: 11px; color: var(--gray-400); }
    .comment-dot { font-size: 12px; color: var(--blue-600); }

    .detail-expand {
      border-top: 1px solid var(--gray-100);
      background: var(--gray-50);
      padding: 12px;
    }
    .detail-expand h4 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--gray-400); margin-bottom: 8px; margin-top: 12px;
    }
    .detail-expand h4:first-child { margin-top: 0; }
    .ach-row {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: 8px; padding: 6px 8px; margin-bottom: 6px;
      font-size: 13px;
    }
    .ach-row.latest { border-color: var(--blue-300); }
    .ach-row .tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      color: var(--blue-600); letter-spacing: 0.03em;
    }
    .ach-row .date { font-size: 12px; color: var(--gray-400); margin-left: auto; white-space: nowrap; }
    .ach-row select { flex: 1; min-width: 0; padding: 4px 8px; }
    .add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .add-row select, .add-row input { flex: 1; min-width: 120px; }

    .comment-row {
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: 8px; padding: 8px 10px; margin-bottom: 6px;
      font-size: 13px;
    }
    .comment-row .cdate { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
    .comment-actions { display: flex; gap: 6px; margin-top: 6px; }
    .comment-row textarea, .add-row textarea {
      width: 100%; border: 1px solid var(--gray-200); border-radius: 8px;
      padding: 7px 10px; font-size: 13px; font-family: inherit;
      resize: vertical; min-height: 52px; outline: none;
    }
    .comment-row textarea:focus, .add-row textarea:focus { border-color: var(--blue-300); }

    /* ---- Beheertabellen ---- */
    .manage-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .manage-head h2 { font-size: 16px; color: var(--blue-700); flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--gray-400);
      padding: 8px 10px; border-bottom: 1px solid var(--gray-200);
    }
    td { padding: 9px 10px; border-bottom: 1px solid var(--gray-100); }
    tr:last-child td { border-bottom: none; }
    td .btn { padding: 4px 9px; font-size: 12px; }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .form-row input, .form-row select { flex: 1; min-width: 120px; }

    .empty-state { text-align: center; padding: 40px 24px; color: var(--gray-600); }
    .empty-state .splash { font-size: 40px; margin-bottom: 10px; }
    .empty-state h2 { font-size: 16px; color: var(--gray-800); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; }

    .app-footer { margin-top: 28px; text-align: center; font-size: 12px; color: var(--gray-400); }

    @media (max-width: 720px) {
      .week-grid { grid-template-columns: repeat(2, 1fr); }
      .day-col { min-height: 100px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const APP_VERSION = "3.0.0";
    const STORAGE_KEY = "deplons.state.v1";
    const WEEKDAYS = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    const WEEKDAYS_SHORT = ["Ma", "Di", "Wo", "Do", "Vr", "Za", "Zo"];

    /* ---------- Opslag ---------- */
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }
    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    const todayISO = () => new Date().toISOString().slice(0, 10);

    /* ---------- Migratie: levelId -> achievements[] ---------- */
    function migratePupil(p) {
      const pupil = { ...p };
      if (!Array.isArray(pupil.achievements)) {
        pupil.achievements = pupil.levelId
          ? [{ id: uid(), levelId: pupil.levelId, date: null }]
          : [];
      }
      if (!Array.isArray(pupil.comments)) pupil.comments = [];
      delete pupil.levelId;
      return pupil;
    }

    /* Laatst behaalde = laatste element in de lijst */
    const latestAch = (p) => p.achievements.length ? p.achievements[p.achievements.length - 1] : null;

    /* ---------- Datum helpers ---------- */
    function startOfWeek(d) {
      const date = new Date(d);
      const day = (date.getDay() + 6) % 7; // maandag = 0
      date.setDate(date.getDate() - day);
      date.setHours(0, 0, 0, 0);
      return date;
    }
    function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
    function fmtDate(d) { return d.toLocaleDateString("nl-BE", { day: "numeric", month: "long" }); }
    function fmtISO(iso) {
      if (!iso) return "";
      return new Date(iso + "T00:00:00").toLocaleDateString("nl-BE", { day: "numeric", month: "short", year: "numeric" });
    }
    function fmtRange(mon) {
      const sun = addDays(mon, 6);
      return `${mon.getDate()} ${mon.toLocaleDateString("nl-BE", { month: "short" })} – ${sun.getDate()} ${sun.toLocaleDateString("nl-BE", { month: "short" })} ${sun.getFullYear()}`;
    }
    const sameDay = (a, b) => a.toDateString() === b.toDateString();

    /* ---------- Standaard brevetniveaus ---------- */
    const DEFAULT_LEVELS = [
      "Waterwennen", "Eendje", "Pinguïn", "Zeepaardje", "Zeester",
      "Dolfijn", "Brevet 25m", "Brevet 50m", "Brevet 100m"
    ];

    const TABS = [
      { id: "kalender", label: "📅 Kalender" },
      { id: "leerlingen", label: "🧒 Leerlingen" },
      { id: "lesgevers", label: "🏊 Lesgevers" },
      { id: "brevetten", label: "🎖️ Brevetten" },
    ];

    /* ================= Kalender ================= */
    function CalendarView({ data, openDay }) {
      const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
      const [filterTeacher, setFilterTeacher] = useState("");
      const today = new Date();

      const pupilsFor = (weekdayIdx) =>
        data.pupils.filter(p =>
          p.weekday === weekdayIdx &&
          (!filterTeacher || p.teacherId === filterTeacher)
        );

      const levelName = (id) => (data.levels.find(l => l.id === id) || {}).name || "—";
      const latestName = (p) => { const a = latestAch(p); return a ? levelName(a.levelId) : "—"; };

      return (
        <div className="card">
          <div className="cal-toolbar">
            <button className="btn" onClick={() => setWeekStart(addDays(weekStart, -7))}>←</button>
            <button className="btn" onClick={() => setWeekStart(startOfWeek(new Date()))}>Vandaag</button>
            <button className="btn" onClick={() => setWeekStart(addDays(weekStart, 7))}>→</button>
            <span className="cal-title">{fmtRange(weekStart)}</span>
            <span className="spacer"></span>
            <select value={filterTeacher} onChange={e => setFilterTeacher(e.target.value)}>
              <option value="">Alle lesgevers</option>
              {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>

          <div className="week-grid">
            {WEEKDAYS.map((_, i) => {
              const date = addDays(weekStart, i);
              const pupils = pupilsFor(i);
              return (
                <div
                  key={i}
                  className={"day-col" + (sameDay(date, today) ? " today" : "")}
                  onClick={() => openDay({ weekday: i, date, filterTeacher })}
                >
                  <div className="day-head">
                    <div className="dname">{WEEKDAYS_SHORT[i]}</div>
                    <div className="dnum">{date.getDate()}</div>
                  </div>
                  {pupils.slice(0, 5).map(p => (
                    <div key={p.id} className="pupil-chip" title={p.name + " · " + latestName(p)}>
                      {p.name} <span className="lvl">· {latestName(p)}</span>
                    </div>
                  ))}
                  {pupils.length > 5 && <div className="day-count">+{pupils.length - 5} meer</div>}
                  {pupils.length === 0 && <div className="day-count">—</div>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ================= Dagdetail: leerling-paneel ================= */
    function PupilDetail({ pupil, data, update }) {
      const [newLevelId, setNewLevelId] = useState("");
      const [newDate, setNewDate] = useState(todayISO());
      const [newComment, setNewComment] = useState("");
      const [editCommentId, setEditCommentId] = useState(null);
      const [editCommentText, setEditCommentText] = useState("");

      const patchPupil = (fn) => update(d => ({
        ...d,
        pupils: d.pupils.map(p => p.id === pupil.id ? fn(p) : p)
      }));

      const addAchievement = () => {
        if (!newLevelId) return;
        patchPupil(p => ({
          ...p,
          achievements: [...p.achievements, { id: uid(), levelId: newLevelId, date: newDate || todayISO() }]
        }));
        setNewLevelId("");
        setNewDate(todayISO());
      };
      const changeAchLevel = (achId, levelId) => patchPupil(p => ({
        ...p,
        achievements: p.achievements.map(a => a.id === achId ? { ...a, levelId } : a)
      }));
      const removeAch = (achId) => patchPupil(p => ({
        ...p,
        achievements: p.achievements.filter(a => a.id !== achId)
      }));

      const addComment = () => {
        if (!newComment.trim()) return;
        patchPupil(p => ({
          ...p,
          comments: [...p.comments, { id: uid(), text: newComment.trim(), date: todayISO() }]
        }));
        setNewComment("");
      };
      const startEditComment = (c) => { setEditCommentId(c.id); setEditCommentText(c.text); };
      const saveComment = () => {
        const text = editCommentText.trim();
        patchPupil(p => ({
          ...p,
          comments: text
            ? p.comments.map(c => c.id === editCommentId ? { ...c, text, date: todayISO() } : c)
            : p.comments
        }));
        setEditCommentId(null); setEditCommentText("");
      };
      const removeComment = (id) => patchPupil(p => ({ ...p, comments: p.comments.filter(c => c.id !== id) }));

      const achievementsNewestFirst = [...pupil.achievements].reverse();

      return (
        <div className="detail-expand" onClick={e => e.stopPropagation()}>
          <h4>Behaalde brevetten</h4>
          {pupil.achievements.length === 0 &&
            <p style={{ fontSize: 13, color: "var(--gray-600)", marginBottom: 8 }}>Nog geen brevetten behaald.</p>}
          {achievementsNewestFirst.map((a, idx) => (
            <div key={a.id} className={"ach-row" + (idx === 0 ? " latest" : "")}>
              {idx === 0 && <span className="tag">Laatst</span>}
              <select value={a.levelId} onChange={e => changeAchLevel(a.id, e.target.value)}>
                {data.levels.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
              </select>
              <span className="date">{a.date ? fmtISO(a.date) : ""}</span>
              <button className="btn danger small" onClick={() => removeAch(a.id)}>🗑️</button>
            </div>
          ))}
          <div className="add-row" style={{ marginTop: 8 }}>
            <select value={newLevelId} onChange={e => setNewLevelId(e.target.value)}>
              <option value="">Nieuw brevet behaald…</option>
              {data.levels.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
            </select>
            <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} />
            <button className="btn primary small" onClick={addAchievement}>✓ Toevoegen</button>
          </div>

          <h4>Commentaar</h4>
          {pupil.comments.map(c => (
            <div key={c.id} className="comment-row">
              {editCommentId === c.id
                ? <React.Fragment>
                    <textarea value={editCommentText} onChange={e => setEditCommentText(e.target.value)} autoFocus />
                    <div className="comment-actions">
                      <button className="btn primary small" onClick={saveComment}>Opslaan</button>
                      <button className="btn small" onClick={() => setEditCommentId(null)}>Annuleren</button>
                    </div>
                  </React.Fragment>
                : <React.Fragment>
                    <div>{c.text}</div>
                    <div className="cdate">{fmtISO(c.date)}</div>
                    <div className="comment-actions">
                      <button className="btn small" onClick={() => startEditComment(c)}>✏️ Bewerken</button>
                      <button className="btn danger small" onClick={() => removeComment(c.id)}>🗑️ Verwijderen</button>
                    </div>
                  </React.Fragment>}
            </div>
          ))}
          <div className="add-row" style={{ marginTop: 8, flexDirection: "column", alignItems: "stretch" }}>
            <textarea placeholder="Nieuwe commentaar bij deze leerling…" value={newComment}
              onChange={e => setNewComment(e.target.value)} />
            <div><button className="btn primary small" onClick={addComment}>+ Commentaar toevoegen</button></div>
          </div>
        </div>
      );
    }

    function DayDetailModal({ detail, data, update, onClose }) {
      const [expandedId, setExpandedId] = useState(null);

      const pupils = data.pupils.filter(p =>
        p.weekday === detail.weekday &&
        (!detail.filterTeacher || p.teacherId === detail.filterTeacher)
      );
      const levelName = (id) => (data.levels.find(l => l.id === id) || {}).name || "—";
      const teacherName = (id) => (data.teachers.find(t => t.id === id) || {}).name || "—";

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="btn" style={{ float: "right" }} onClick={onClose}>✕</button>
            <h3>{WEEKDAYS[detail.weekday]} {fmtDate(detail.date)}</h3>
            <div className="sub">
              {pupils.length} leerling{pupils.length !== 1 ? "en" : ""}
              {detail.filterTeacher ? " · " + teacherName(detail.filterTeacher) : ""} · klik op een leerling voor brevetten &amp; commentaar
            </div>
            {pupils.length === 0 && <p style={{ fontSize: 14, color: "var(--gray-600)" }}>Geen leerlingen ingepland op deze dag.</p>}
            {pupils.map(p => {
              const latest = latestAch(p);
              const expanded = expandedId === p.id;
              return (
                <div key={p.id} className="detail-row">
                  <div className="detail-main" onClick={() => setExpandedId(expanded ? null : p.id)}>
                    <div>
                      <div className="name">
                        {p.name}{" "}
                        {p.comments.length > 0 && <span className="comment-dot" title={p.comments.length + " commentaar"}>💬{p.comments.length}</span>}
                      </div>
                      <div className="teacher">Lesgever: {teacherName(p.teacherId)}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {latest
                        ? <span className="badge">{levelName(latest.levelId)}</span>
                        : <span className="badge muted">Geen brevet</span>}
                      <span className="chevron">{expanded ? "▲" : "▼"}</span>
                    </div>
                  </div>
                  {expanded && <PupilDetail pupil={p} data={data} update={update} />}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ================= Leerlingen ================= */
    function PupilsView({ data, update }) {
      const [name, setName] = useState("");
      const [levelId, setLevelId] = useState("");
      const [teacherId, setTeacherId] = useState("");
      const [weekday, setWeekday] = useState("");
      const [editId, setEditId] = useState(null);

      const reset = () => { setName(""); setLevelId(""); setTeacherId(""); setWeekday(""); setEditId(null); };

      const submit = () => {
        if (!name.trim()) return;
        if (editId) {
          update(d => ({
            ...d,
            pupils: d.pupils.map(p => p.id === editId ? {
              ...p,
              name: name.trim(),
              teacherId: teacherId || null,
              weekday: weekday === "" ? null : Number(weekday),
            } : p)
          }));
        } else {
          update(d => ({
            ...d,
            pupils: [...d.pupils, {
              id: uid(),
              name: name.trim(),
              teacherId: teacherId || null,
              weekday: weekday === "" ? null : Number(weekday),
              achievements: levelId ? [{ id: uid(), levelId, date: todayISO() }] : [],
              comments: [],
            }]
          }));
        }
        reset();
      };

      const edit = (p) => {
        setEditId(p.id); setName(p.name);
        setLevelId("");
        setTeacherId(p.teacherId || "");
        setWeekday(p.weekday === null || p.weekday === undefined ? "" : String(p.weekday));
      };

      const remove = (id) => update(d => ({ ...d, pupils: d.pupils.filter(p => p.id !== id) }));

      const levelName = (id) => (data.levels.find(l => l.id === id) || {}).name || "—";
      const teacherName = (id) => (data.teachers.find(t => t.id === id) || {}).name || "—";

      return (
        <div className="card">
          <div className="manage-head"><h2>Leerlingen</h2></div>
          <div className="form-row">
            <input type="text" placeholder="Naam leerling" value={name} onChange={e => setName(e.target.value)} />
            {!editId &&
              <select value={levelId} onChange={e => setLevelId(e.target.value)}>
                <option value="">Eerste brevet (optioneel)…</option>
                {data.levels.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
              </select>}
            <select value={teacherId} onChange={e => setTeacherId(e.target.value)}>
              <option value="">Lesgever…</option>
              {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <select value={weekday} onChange={e => setWeekday(e.target.value)}>
              <option value="">Lesdag…</option>
              {WEEKDAYS.map((d, i) => <option key={i} value={i}>{d}</option>)}
            </select>
            <button className="btn primary" onClick={submit}>{editId ? "Opslaan" : "+ Toevoegen"}</button>
            {editId && <button className="btn" onClick={reset}>Annuleren</button>}
          </div>
          <p style={{ fontSize: 12, color: "var(--gray-400)", marginTop: -8, marginBottom: 14 }}>
            Brevetten en commentaar beheer je via het dagoverzicht in de kalender (klik op een dag, dan op de leerling).
          </p>
          {data.pupils.length === 0
            ? <div className="empty-state"><div className="splash">🧒</div><h2>Nog geen leerlingen</h2><p>Voeg hierboven je eerste leerling toe.</p></div>
            : <table>
                <thead><tr><th>Naam</th><th>Laatste brevet</th><th>Behaald</th><th>💬</th><th>Lesgever</th><th>Lesdag</th><th></th></tr></thead>
                <tbody>
                  {data.pupils.map(p => {
                    const latest = latestAch(p);
                    return (
                      <tr key={p.id}>
                        <td><strong>{p.name}</strong></td>
                        <td>{latest ? <span className="badge">{levelName(latest.levelId)}</span> : <span className="badge muted">—</span>}</td>
                        <td>{p.achievements.length}</td>
                        <td>{p.comments.length || "—"}</td>
                        <td>{teacherName(p.teacherId)}</td>
                        <td>{p.weekday === null || p.weekday === undefined ? "—" : WEEKDAYS[p.weekday]}</td>
                        <td style={{ textAlign: "right", whiteSpace: "nowrap" }}>
                          <button className="btn" onClick={() => edit(p)}>✏️</button>{" "}
                          <button className="btn danger" onClick={() => remove(p.id)}>🗑️</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>}
        </div>
      );
    }

    /* ================= Lesgevers ================= */
    function TeachersView({ data, update }) {
      const [name, setName] = useState("");
      const add = () => {
        if (!name.trim()) return;
        update(d => ({ ...d, teachers: [...d.teachers, { id: uid(), name: name.trim() }] }));
        setName("");
      };
      const remove = (id) => update(d => ({
        ...d,
        teachers: d.teachers.filter(t => t.id !== id),
        pupils: d.pupils.map(p => p.teacherId === id ? { ...p, teacherId: null } : p),
      }));
      const count = (id) => data.pupils.filter(p => p.teacherId === id).length;

      return (
        <div className="card">
          <div className="manage-head"><h2>Lesgevers</h2></div>
          <div className="form-row">
            <input type="text" placeholder="Naam lesgever" value={name}
              onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
            <button className="btn primary" onClick={add}>+ Toevoegen</button>
          </div>
          {data.teachers.length === 0
            ? <div className="empty-state"><div className="splash">🏊</div><h2>Nog geen lesgevers</h2><p>Voeg hierboven je eerste lesgever toe.</p></div>
            : <table>
                <thead><tr><th>Naam</th><th>Leerlingen</th><th></th></tr></thead>
                <tbody>
                  {data.teachers.map(t => (
                    <tr key={t.id}>
                      <td><strong>{t.name}</strong></td>
                      <td>{count(t.id)}</td>
                      <td style={{ textAlign: "right" }}>
                        <button className="btn danger" onClick={() => remove(t.id)}>🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>}
        </div>
      );
    }

    /* ================= Brevetniveaus ================= */
    function LevelsView({ data, update }) {
      const [name, setName] = useState("");
      const add = () => {
        if (!name.trim()) return;
        update(d => ({ ...d, levels: [...d.levels, { id: uid(), name: name.trim() }] }));
        setName("");
      };
      const remove = (id) => update(d => ({
        ...d,
        levels: d.levels.filter(l => l.id !== id),
        pupils: d.pupils.map(p => ({ ...p, achievements: p.achievements.filter(a => a.levelId !== id) })),
      }));
      const move = (idx, dir) => update(d => {
        const levels = [...d.levels];
        const j = idx + dir;
        if (j < 0 || j >= levels.length) return d;
        [levels[idx], levels[j]] = [levels[j], levels[idx]];
        return { ...d, levels };
      });
      const count = (id) => data.pupils.filter(p => p.achievements.some(a => a.levelId === id)).length;

      return (
        <div className="card">
          <div className="manage-head"><h2>Brevetniveaus</h2></div>
          <div className="form-row">
            <input type="text" placeholder="Naam brevetniveau" value={name}
              onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
            <button className="btn primary" onClick={add}>+ Toevoegen</button>
          </div>
          <table>
            <thead><tr><th>#</th><th>Niveau</th><th>Behaald door</th><th></th></tr></thead>
            <tbody>
              {data.levels.map((l, i) => (
                <tr key={l.id}>
                  <td>{i + 1}</td>
                  <td><span className="badge">{l.name}</span></td>
                  <td>{count(l.id)}</td>
                  <td style={{ textAlign: "right", whiteSpace: "nowrap" }}>
                    <button className="btn" onClick={() => move(i, -1)}>↑</button>{" "}
                    <button className="btn" onClick={() => move(i, 1)}>↓</button>{" "}
                    <button className="btn danger" onClick={() => remove(l.id)}>🗑️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ================= App ================= */
    function App() {
      const [data, setData] = useState(() => {
        const s = loadState();
        return {
          lastTab: s.lastTab || "kalender",
          levels: s.levels || DEFAULT_LEVELS.map(name => ({ id: uid() + name, name })),
          teachers: s.teachers || [],
          pupils: (s.pupils || []).map(migratePupil),
        };
      });
      const [activeTab, setActiveTab] = useState(data.lastTab);
      const [dayDetail, setDayDetail] = useState(null);

      useEffect(() => { saveState({ ...data, lastTab: activeTab }); }, [data, activeTab]);

      const update = (fn) => setData(d => fn(d));

      return (
        <React.Fragment>
          <header className="app-header">
            <div className="app-logo">🌊</div>
            <div className="app-title">
              <h1>De plons</h1>
              <p>Zwemles-niveaus bijhouden</p>
            </div>
          </header>

          <nav className="tab-bar">
            {TABS.map(tab => (
              <button key={tab.id}
                className={activeTab === tab.id ? "active" : ""}
                onClick={() => setActiveTab(tab.id)}>
                {tab.label}
              </button>
            ))}
          </nav>

          {activeTab === "kalender" && <CalendarView data={data} openDay={setDayDetail} />}
          {activeTab === "leerlingen" && <PupilsView data={data} update={update} />}
          {activeTab === "lesgevers" && <TeachersView data={data} update={update} />}
          {activeTab === "brevetten" && <LevelsView data={data} update={update} />}

          {dayDetail && <DayDetailModal detail={dayDetail} data={data} update={update} onClose={() => setDayDetail(null)} />}

          <footer className="app-footer">De plons · v{APP_VERSION}</footer>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
