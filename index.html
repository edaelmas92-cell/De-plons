<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De plons</title>
  <meta name="theme-color" content="#457fa6" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="De plons" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      /* Grijs / lichtblauw palet */
      --blue-25:  #f6fafd;
      --blue-50:  #eff6fb;
      --blue-100: #dbeaf5;
      --blue-200: #b8d7ea;
      --blue-300: #8fc0dc;
      --blue-400: #6faccb;
      --blue-500: #5a9bc4;
      --blue-600: #457fa6;
      --blue-700: #35637f;
      --blue-800: #294c62;
      --gray-50:  #f7f8f9;
      --gray-100: #eef0f2;
      --gray-200: #dfe3e6;
      --gray-300: #c8cfd4;
      --gray-400: #9aa4ac;
      --gray-600: #5c666e;
      --gray-800: #2f363c;
      /* Accentkleuren */
      --aqua-100: #d2f4f0;
      --aqua-300: #7addd2;
      --aqua-500: #2ec4b6;
      --aqua-600: #21a396;
      --sun-100: #fff3d1;
      --sun-300: #ffd98a;
      --sun-800: #8a6520;
      --coral-100: #ffe4dc;
      --coral-500: #ff8e72;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-sm: 0 1px 2px rgba(41, 76, 98, 0.06), 0 2px 8px rgba(41, 76, 98, 0.05);
      --shadow: 0 2px 4px rgba(41, 76, 98, 0.06), 0 8px 24px rgba(41, 76, 98, 0.09);
      --shadow-lg: 0 12px 48px rgba(41, 76, 98, 0.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(900px 300px at 15% -60px, var(--aqua-100) 0%, transparent 65%),
        radial-gradient(1200px 400px at 70% -100px, var(--blue-100) 0%, transparent 70%),
        linear-gradient(180deg, var(--blue-50) 0%, var(--gray-50) 420px);
      color: var(--gray-800);
      min-height: 100vh;
    }
    #root { max-width: 1020px; margin: 0 auto; padding: 0 16px 56px; }

    /* ---------- Header (kleurrijke banner) ---------- */
    .app-header {
      position: relative;
      display: flex; align-items: center; gap: 16px;
      margin: 20px 0 18px;
      padding: 22px 24px;
      background: linear-gradient(120deg, var(--blue-600) 0%, var(--blue-500) 45%, var(--aqua-500) 100%);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(46, 127, 179, 0.35);
      overflow: hidden;
    }
    .app-logo {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      z-index: 1;
    }
    .app-title { z-index: 1; }
    .app-title h1 {
      font-size: 26px; font-weight: 900; color: #fff;
      letter-spacing: -0.02em; line-height: 1.1;
      text-shadow: 0 1px 3px rgba(41, 76, 98, 0.25);
    }
    .app-title p { font-size: 13.5px; color: var(--blue-100); font-weight: 700; }
    .header-wave {
      position: absolute; right: 14px; bottom: 10px;
      opacity: 0.85; pointer-events: none;
    }
    .header-bubbles {
      position: absolute; right: 90px; top: -20px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .header-bubbles::after {
      content: ""; position: absolute; left: -70px; top: 90px;
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    /* ---------- Tabs ---------- */
    .tab-bar {
      display: flex; gap: 4px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(6px);
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      padding: 5px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }
    .tab-bar button {
      flex: 1; min-width: 105px;
      border: none; cursor: pointer;
      background: transparent; color: var(--gray-600);
      font-family: inherit;
      font-size: 14px; font-weight: 700;
      padding: 10px 16px; border-radius: 999px;
      transition: all 0.18s ease;
    }
    .tab-bar button:hover { color: var(--blue-700); background: var(--blue-50); }
    .tab-bar button.active {
      background: linear-gradient(120deg, var(--blue-500), var(--aqua-500));
      color: #fff;
      box-shadow: 0 2px 8px rgba(46, 196, 182, 0.4);
    }

    /* ---------- Kaart ---------- */
    .card {
      background: #fff;
      border: 1px solid rgba(184, 215, 234, 0.5);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    /* ---------- Knoppen & inputs ---------- */
    .btn {
      border: 1px solid var(--gray-200);
      background: #fff; color: var(--gray-600);
      border-radius: 999px; padding: 8px 15px;
      font-family: inherit;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }
    .btn:hover { border-color: var(--blue-300); color: var(--blue-700); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.primary {
      background: linear-gradient(120deg, var(--blue-500), var(--aqua-500));
      border-color: transparent; color: #fff;
      box-shadow: 0 2px 8px rgba(46, 196, 182, 0.35);
    }
    .btn.primary:hover { background: linear-gradient(120deg, var(--blue-400), var(--aqua-300)); color: #fff; }
    .btn.danger:hover { border-color: #d9848c; color: #b04350; }
    .btn.small { padding: 5px 11px; font-size: 12px; }
    select, input[type="text"], input[type="date"] {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 9px 12px;
      font-family: inherit;
      font-size: 13.5px; color: var(--gray-800);
      background: var(--gray-50); outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    select:focus, input[type="text"]:focus, input[type="date"]:focus {
      border-color: var(--blue-300); background: #fff;
      box-shadow: 0 0 0 3px rgba(143, 192, 220, 0.25);
    }

    /* ---------- Kalender ---------- */
    .cal-toolbar {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 18px;
    }
    .cal-toolbar .spacer { flex: 1; }
    .cal-title { font-size: 16.5px; font-weight: 800; color: var(--blue-800); }
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .day-col {
      background: var(--blue-25);
      border: 1.5px solid transparent;
      border-radius: 14px;
      padding: 0 8px 8px;
      min-height: 150px;
      cursor: pointer;
      transition: all 0.18s ease;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .day-col:hover { border-color: var(--blue-300); transform: translateY(-2px); box-shadow: var(--shadow); }
    .day-head {
      text-align: center;
      margin: 0 -8px 10px;
      padding: 8px 0 7px;
      background: var(--gray-100);
      transition: background 0.18s;
    }
    .day-col:hover .day-head { background: var(--blue-100); }
    .day-head .dname { font-size: 10.5px; font-weight: 800; text-transform: uppercase; color: var(--gray-400); letter-spacing: 0.08em; }
    .day-head .dnum { font-size: 17px; font-weight: 800; color: var(--gray-600); line-height: 1.15; }
    .day-col.today { background: #fff; border-color: var(--aqua-500); }
    .day-col.today .day-head { background: linear-gradient(120deg, var(--blue-500), var(--aqua-500)); }
    .day-col.today .day-head .dname { color: var(--blue-100); }
    .day-col.today .day-head .dnum { color: #fff; }
    .pupil-chip {
      display: flex; align-items: center; gap: 5px;
      background: #fff;
      border: 1px solid var(--blue-100);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px; font-weight: 600;
      margin-bottom: 5px;
      color: var(--gray-800);
      box-shadow: var(--shadow-sm);
      overflow: hidden; white-space: nowrap;
    }
    .pupil-chip { cursor: grab; }
    .pupil-chip:active { cursor: grabbing; }
    .day-col.drop-target {
      border-color: var(--coral-500);
      background: var(--coral-100);
      transform: translateY(-2px);
    }
    .pupil-chip .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .pupil-chip .pname { overflow: hidden; text-overflow: ellipsis; }
    .day-count { font-size: 11px; font-weight: 700; color: var(--gray-400); text-align: center; margin-top: 5px; }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(41, 76, 98, 0.45);
      backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 16px;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: #fff; border-radius: 20px;
      box-shadow: var(--shadow-lg);
      max-width: 580px; width: 100%;
      max-height: 86vh; overflow-y: auto;
      animation: popIn 0.18s ease;
    }
    @keyframes popIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
    .modal-header {
      position: sticky; top: 0; z-index: 2;
      background: linear-gradient(120deg, var(--blue-600), var(--blue-500) 55%, var(--aqua-500));
      color: #fff;
      padding: 18px 24px 16px;
      border-radius: 20px 20px 0 0;
    }
    .modal-header h3 { font-size: 18px; font-weight: 800; }
    .modal-header .sub { font-size: 13px; color: var(--blue-100); font-weight: 600; margin-top: 2px; }
    .modal-header .btn {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.18); border-color: transparent; color: #fff;
      box-shadow: none;
    }
    .modal-header .btn:hover { background: rgba(255,255,255,0.3); transform: none; }
    .modal-body { padding: 18px 24px 24px; }
    .modal-filter {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .modal-filter select { flex: 1; }
    .moved-tag {
      color: var(--coral-500); font-weight: 800; font-size: 11.5px;
    }

    .detail-row {
      border: 1px solid var(--gray-200);
      border-radius: 14px; margin-bottom: 10px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.15s;
    }
    .detail-row:hover { border-color: var(--blue-200); }
    .detail-main {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer; gap: 8px;
    }
    .detail-row .name { font-weight: 800; font-size: 15.5px; color: var(--blue-800); }
    .detail-row .teacher { font-size: 12px; font-weight: 600; color: var(--gray-400); margin-top: 1px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--blue-100); color: var(--blue-700);
      font-size: 12px; font-weight: 800;
      border-radius: 999px; padding: 4px 12px;
      white-space: nowrap;
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .badge.muted { background: var(--gray-100); color: var(--gray-400); }
    .chevron { font-size: 10px; color: var(--gray-400); }
    .inline-comments {
      border-top: 1px dashed var(--sun-300);
      padding: 9px 14px;
      background: var(--sun-100);
    }
    .inline-comment { font-size: 13px; font-weight: 600; color: var(--sun-800); margin-bottom: 4px; }
    .inline-comment:last-child { margin-bottom: 0; }
    .inline-comment .cdate { color: color-mix(in srgb, var(--sun-800) 55%, white); font-size: 11px; }

    .detail-expand {
      border-top: 1px solid var(--gray-100);
      background: var(--blue-25);
      padding: 14px;
    }
    .detail-expand h4 {
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--blue-600); margin-bottom: 8px; margin-top: 14px;
    }
    .detail-expand h4:first-child { margin-top: 0; }
    .ach-row {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 7px 9px; margin-bottom: 6px;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
    }
    .ach-row.latest { border-color: var(--blue-400); }
    .ach-row .tag {
      font-size: 9.5px; font-weight: 900; text-transform: uppercase;
      background: var(--blue-500); color: #fff;
      border-radius: 999px; padding: 2px 8px;
      letter-spacing: 0.05em;
    }
    .ach-row .date { font-size: 12px; font-weight: 600; color: var(--gray-400); margin-left: auto; white-space: nowrap; }
    .ach-row select { flex: 1; min-width: 0; padding: 5px 8px; }
    .add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .add-row select, .add-row input { flex: 1; min-width: 120px; }

    .comment-row {
      background: #fff; border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 9px 11px; margin-bottom: 6px;
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-sm);
    }
    .comment-row .cdate { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
    .comment-actions { display: flex; gap: 6px; margin-top: 7px; }
    .comment-row textarea, .add-row textarea {
      width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
      padding: 8px 11px; font-size: 13px; font-family: inherit; font-weight: 600;
      resize: vertical; min-height: 54px; outline: none;
      background: var(--gray-50);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .comment-row textarea:focus, .add-row textarea:focus {
      border-color: var(--blue-300); background: #fff;
      box-shadow: 0 0 0 3px rgba(143, 192, 220, 0.25);
    }

    /* ---------- Beheertabellen ---------- */
    .manage-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .manage-head h2 { font-size: 17px; font-weight: 800; color: var(--blue-800); flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; font-size: 10.5px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--gray-400);
      padding: 8px 10px; border-bottom: 2px solid var(--blue-100);
    }
    td { padding: 10px; border-bottom: 1px solid var(--gray-100); }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: var(--blue-25); }
    tr:last-child td { border-bottom: none; }
    td .btn { padding: 5px 10px; font-size: 12px; }

    /* Brevettenas (horizontale stepper) */
    .level-axis {
      display: flex; align-items: flex-start;
      overflow-x: auto; padding: 4px 0 2px;
      -webkit-overflow-scrolling: touch;
    }
    .axis-step {
      display: flex; flex-direction: column; align-items: center;
      position: relative; flex: 1; min-width: 58px;
    }
    .level-axis.compact .axis-step { min-width: 27px; }
    .axis-step:not(:first-child)::before {
      content: ""; position: absolute; top: 12px; right: 50%;
      width: 100%; height: 2.5px;
      background: var(--gray-200); z-index: 0;
    }
    .axis-step.done:not(:first-child)::before { background: var(--blue-300); }
    .level-axis.compact .axis-step:not(:first-child)::before { top: 9px; height: 2px; }
    .axis-dot {
      position: relative; z-index: 1;
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--gray-200);
      background: #fff; color: #fff;
      font-family: inherit; font-size: 11px; font-weight: 900;
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s;
    }
    .axis-dot:hover { transform: scale(1.18); }
    .axis-step.next .axis-dot {
      color: var(--blue-600); border-style: dashed; border-color: var(--blue-500);
      animation: nextPulse 2.2s ease-in-out infinite;
    }
    @keyframes nextPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(90, 155, 196, 0.35); }
      50% { box-shadow: 0 0 0 5px rgba(90, 155, 196, 0); }
    }
    .axis-step.todo .axis-dot { color: transparent; }
    .level-axis.compact .axis-dot { width: 18px; height: 18px; font-size: 9px; }
    .axis-label {
      margin-top: 4px;
      font-size: 9.5px; font-weight: 700; color: var(--gray-400);
      text-align: center; max-width: 66px; line-height: 1.15;
    }
    .row-axis { padding: 0 14px 9px; }

    /* Leerlingenkaarten */
    .pupil-cards { display: flex; flex-direction: column; gap: 10px; }
    .pupil-card {
      border: 1px solid var(--gray-200); border-radius: 14px;
      padding: 12px 14px; background: #fff;
      box-shadow: var(--shadow-sm);
    }
    .pupil-card-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; margin-bottom: 8px;
    }
    .pc-info strong { display: block; font-size: 15px; font-weight: 800; color: var(--blue-800); }
    .pc-meta { font-size: 12px; font-weight: 600; color: var(--gray-400); }
    .pc-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .pupil-card .inline-comments {
      margin: 9px -14px -12px;
      border-radius: 0 0 14px 14px;
    }

    /* Uitklap in leerlingenlijst */
    .expand-tr td { background: var(--blue-25); padding: 12px 14px; }
    .ach-overview h4 {
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--blue-600); margin: 10px 0 7px;
    }
    .ach-overview h4:first-child { margin-top: 0; }
    .ach-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .ach-item { display: inline-flex; align-items: center; gap: 5px; }
    .ach-date { font-size: 11px; font-weight: 700; color: var(--gray-400); }
    .ach-none { font-size: 13px; font-weight: 600; color: var(--gray-600); }
    .ach-overview .inline-comment { color: var(--sun-800); }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .form-row input, .form-row select { flex: 1; min-width: 120px; }
    .form-hint { font-size: 12px; font-weight: 600; color: var(--gray-400); margin-top: -8px; margin-bottom: 16px; }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--gray-600); }
    .empty-state .splash {
      font-size: 40px; margin-bottom: 12px;
      display: inline-flex; width: 84px; height: 84px;
      align-items: center; justify-content: center;
      background: var(--blue-50); border-radius: 50%;
    }
    .empty-state h2 { font-size: 16px; font-weight: 800; color: var(--blue-800); margin-bottom: 5px; }
    .empty-state p { font-size: 13.5px; font-weight: 600; }

    .app-footer {
      margin-top: 32px; text-align: center;
      font-size: 12px; font-weight: 700; color: var(--blue-300);
    }

    /* ---------- Login & laden ---------- */
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .login-card {
      max-width: 360px; width: 100%;
      text-align: center; padding: 32px 28px;
    }
    .login-card h2 { font-size: 22px; font-weight: 900; color: var(--blue-800); margin-bottom: 6px; }
    .login-card p { font-size: 13.5px; font-weight: 600; color: var(--gray-600); margin-bottom: 18px; }
    .login-card form { display: flex; flex-direction: column; gap: 10px; }
    .login-card input { width: 100%; }
    .login-error { color: #b04350; font-size: 13px; font-weight: 700; }
    .logout-btn {
      margin-left: auto; z-index: 2;
      background: rgba(255,255,255,0.18); border-color: transparent; color: #fff;
      box-shadow: none;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); color: #fff; transform: none; }
    .load-screen {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; font-size: 44px;
      color: var(--blue-600); font-weight: 700;
    }
    .load-screen span { font-size: 14px; }

    /* ---------- Compact op telefoon/tablet (aan het zwembad) ---------- */
    @media (max-width: 720px) {
      #root { padding: 0 10px 40px; }
      .app-header { padding: 16px 16px; margin: 12px 0 14px; }
      .app-title h1 { font-size: 21px; }
      .app-logo { width: 46px; height: 46px; font-size: 23px; }
      .header-wave { display: none; }
      .card { padding: 14px; }
      /* Week als compacte lijst: dag links, leerlingen rechts */
      .week-grid { display: flex; flex-direction: column; gap: 7px; }
      .day-col {
        min-height: 0;
        display: flex; align-items: center; gap: 10px;
        padding: 7px 9px;
      }
      .day-head {
        margin: 0; padding: 5px 0;
        width: 46px; flex-shrink: 0;
        border-radius: 9px;
      }
      .day-head .dnum { font-size: 15px; }
      .day-body { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; flex: 1; min-width: 0; }
      .day-body .pupil-chip { margin-bottom: 0; }
      .day-body .day-count { margin-top: 0; }
      /* Grotere tikdoelen */
      .btn { padding: 10px 16px; }
      .btn.small { padding: 7px 12px; }
      .tab-bar button { padding: 11px 12px; min-width: 0; font-size: 13px; }
      select, input[type="text"], input[type="date"] { padding: 11px 12px; }
      .detail-main { padding: 13px 12px; }
      .modal { max-height: 92vh; border-radius: 16px; }
      .modal-header { border-radius: 16px 16px 0 0; padding: 14px 18px 12px; }
      .modal-body { padding: 14px 16px 18px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const APP_VERSION = "5.0.0";
    const WEEKDAYS = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    const WEEKDAYS_SHORT = ["Ma", "Di", "Wo", "Do", "Vr", "Za", "Zo"];

    /* Kleuren voor brevetniveaus (per positie in de niveaulijst) */
    const LEVEL_DOT_COLORS = [
      "#2ec4b6", "#3d9bd1", "#5a6fd1", "#8a5ad1", "#d15ab8",
      "#e0645a", "#e8963c", "#c9a626", "#6db14f", "#4fb18b"
    ];

    /* ---------- Supabase (gedeelde database) ---------- */
    const SUPABASE_URL = "https://gmtmdibcbjatmjbpdizg.supabase.co";
    const SUPABASE_KEY = "sb_publishable_VRlu7IahWLuvjOR_zgjZ5A_F2lWKP_K";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CACHE_KEY = "deplons.cache.v5";
    const todayISO = () => new Date().toISOString().slice(0, 10);

    /* Alles ophalen en omzetten naar de app-vorm */
    async function fetchAll() {
      const [lv, tc, pu, ac, co, ov] = await Promise.all([
        sb.from("levels").select("*").order("position"),
        sb.from("teachers").select("*").order("name"),
        sb.from("pupils").select("*").order("name"),
        sb.from("achievements").select("*"),
        sb.from("comments").select("*").order("noted_on"),
        sb.from("overrides").select("*"),
      ]);
      for (const r of [lv, tc, pu, ac, co, ov]) if (r.error) throw r.error;
      const levels = lv.data.map(l => ({ id: l.id, name: l.name, position: l.position }));
      const pos = Object.fromEntries(levels.map(l => [l.id, l.position]));
      const teachers = tc.data.map(t => ({ id: t.id, name: t.name }));
      const pupils = pu.data.map(p => ({
        id: p.id,
        name: p.name,
        teacherId: p.teacher_id,
        weekday: p.weekday,
        achievements: ac.data
          .filter(a => a.pupil_id === p.id)
          .map(a => ({ id: a.id, levelId: a.level_id, date: a.achieved_on }))
          .sort((a, b) => (pos[a.levelId] ?? 0) - (pos[b.levelId] ?? 0)),
        comments: co.data
          .filter(c => c.pupil_id === p.id)
          .map(c => ({ id: c.id, text: c.body, date: c.noted_on })),
        overrides: ov.data
          .filter(o => o.pupil_id === p.id)
          .map(o => ({ id: o.id, from: o.from_date, to: o.to_date })),
      }));
      return { levels, teachers, pupils };
    }

    /* Alle schrijfacties: eerst naar de database, daarna verversen */
    function makeApi(refresh) {
      const run = async (op) => {
        try {
          const { error } = await op;
          if (error) throw error;
          await refresh();
        } catch (e) {
          console.error(e);
          alert("Opslaan mislukt — controleer je internetverbinding en probeer opnieuw.");
        }
      };
      return {
        toggleAchievement: (pupilId, levelId, has) => run(
          has
            ? sb.from("achievements").delete().eq("pupil_id", pupilId).eq("level_id", levelId)
            : sb.from("achievements").insert({ pupil_id: pupilId, level_id: levelId, achieved_on: todayISO() })
        ),
        addComment: (pupilId, text) => run(sb.from("comments").insert({ pupil_id: pupilId, body: text, noted_on: todayISO() })),
        updateComment: (id, text) => run(sb.from("comments").update({ body: text, noted_on: todayISO() }).eq("id", id)),
        deleteComment: (id) => run(sb.from("comments").delete().eq("id", id)),
        addOverride: (pupilId, from, to) => run(sb.from("overrides").insert({ pupil_id: pupilId, from_date: from, to_date: to })),
        updateOverride: (id, to) => run(sb.from("overrides").update({ to_date: to }).eq("id", id)),
        deleteOverride: (id) => run(sb.from("overrides").delete().eq("id", id)),
        addPupil: async (fields, firstLevelId) => {
          try {
            const { data: rows, error } = await sb.from("pupils")
              .insert({ name: fields.name, teacher_id: fields.teacherId, weekday: fields.weekday })
              .select();
            if (error) throw error;
            if (firstLevelId && rows && rows[0]) {
              const r2 = await sb.from("achievements").insert({ pupil_id: rows[0].id, level_id: firstLevelId, achieved_on: todayISO() });
              if (r2.error) throw r2.error;
            }
            await refresh();
          } catch (e) {
            console.error(e);
            alert("Opslaan mislukt — controleer je internetverbinding en probeer opnieuw.");
          }
        },
        updatePupil: (id, fields) => run(sb.from("pupils").update({ name: fields.name, teacher_id: fields.teacherId, weekday: fields.weekday }).eq("id", id)),
        deletePupil: (id) => run(sb.from("pupils").delete().eq("id", id)),
        addTeacher: (name) => run(sb.from("teachers").insert({ name })),
        deleteTeacher: (id) => run(sb.from("teachers").delete().eq("id", id)),
        addLevel: (name, position) => run(sb.from("levels").insert({ name, position })),
        deleteLevel: (id) => run(sb.from("levels").delete().eq("id", id)),
        swapLevels: async (a, b) => {
          try {
            const r1 = await sb.from("levels").update({ position: b.position }).eq("id", a.id);
            if (r1.error) throw r1.error;
            const r2 = await sb.from("levels").update({ position: a.position }).eq("id", b.id);
            if (r2.error) throw r2.error;
            await refresh();
          } catch (e) {
            console.error(e);
            alert("Opslaan mislukt — controleer je internetverbinding en probeer opnieuw.");
          }
        },
      };
    }

    /* Laatst behaalde = laatste element in de lijst (gesorteerd op niveauvolgorde) */
    const latestAch = (p) => p.achievements.length ? p.achievements[p.achievements.length - 1] : null;

    /* ---------- Datum helpers ---------- */
    function startOfWeek(d) {
      const date = new Date(d);
      const day = (date.getDay() + 6) % 7; // maandag = 0
      date.setDate(date.getDate() - day);
      date.setHours(0, 0, 0, 0);
      return date;
    }
    function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
    function toISODate(d) {
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }
    /* Wie zwemt er op deze datum? (vaste lesdag + eenmalige verplaatsingen) */
    function pupilsOnDate(pupils, date) {
      const iso = toISODate(date);
      const wd = (date.getDay() + 6) % 7;
      const result = [];
      pupils.forEach(p => {
        const ov = p.overrides || [];
        const movedHere = ov.find(o => o.to === iso);
        if (movedHere) result.push({ pupil: p, moved: true, override: movedHere });
        else if (p.weekday === wd && !ov.some(o => o.from === iso)) result.push({ pupil: p, moved: false, override: null });
      });
      return result;
    }
    function fmtDate(d) { return d.toLocaleDateString("nl-BE", { day: "numeric", month: "long" }); }
    function fmtISO(iso) {
      if (!iso) return "";
      return new Date(iso + "T00:00:00").toLocaleDateString("nl-BE", { day: "numeric", month: "short", year: "numeric" });
    }
    function fmtRange(mon) {
      const sun = addDays(mon, 6);
      return `${mon.getDate()} ${mon.toLocaleDateString("nl-BE", { month: "short" })} – ${sun.getDate()} ${sun.toLocaleDateString("nl-BE", { month: "short" })} ${sun.getFullYear()}`;
    }
    const sameDay = (a, b) => a.toDateString() === b.toDateString();

    const TABS = [
      { id: "kalender", label: "📅 Kalender" },
      { id: "leerlingen", label: "🧒 Leerlingen" },
      { id: "lesgevers", label: "🏊 Lesgevers" },
      { id: "brevetten", label: "🎖️ Brevetten" },
    ];

    /* ---------- Niveau helpers ---------- */
    function useLevelHelpers(data) {
      const levelName = (id) => (data.levels.find(l => l.id === id) || {}).name || "—";
      const levelColor = (id) => {
        const idx = data.levels.findIndex(l => l.id === id);
        return idx === -1 ? "var(--gray-400)" : LEVEL_DOT_COLORS[idx % LEVEL_DOT_COLORS.length];
      };
      return { levelName, levelColor };
    }

    function LevelBadge({ levelId, data }) {
      const { levelName, levelColor } = useLevelHelpers(data);
      if (!levelId) return <span className="badge muted">Geen brevet</span>;
      const c = levelColor(levelId);
      return (
        <span className="badge" style={{
          background: `color-mix(in srgb, ${c} 16%, white)`,
          color: `color-mix(in srgb, ${c} 72%, black)`
        }}>
          <span className="dot" style={{ background: c }}></span>
          {levelName(levelId)}
        </span>
      );
    }

    /* ================= Kalender ================= */
    function CalendarView({ data, api, openDay }) {
      const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
      const [filterTeacher, setFilterTeacher] = useState("");
      const [dropTarget, setDropTarget] = useState(null);
      const today = new Date();
      const { levelName, levelColor } = useLevelHelpers(data);

      /* Naam naar andere dag slepen = les eenmalig verplaatsen */
      const onDropPupil = (e, targetDate) => {
        e.preventDefault();
        e.stopPropagation();
        setDropTarget(null);
        let payload;
        try { payload = JSON.parse(e.dataTransfer.getData("text/plain")); } catch { return; }
        if (!payload || !payload.pupilId) return;
        const toISO = toISODate(targetDate);
        const fromISO = payload.fromISO;
        if (toISO === fromISO) return;
        const pupil = data.pupils.find(p => p.id === payload.pupilId);
        if (!pupil) return;
        const existing = (pupil.overrides || []).find(o => o.to === fromISO);
        if (existing) {
          /* was al verplaatst: terug naar oorsprong = override weg, anders bestemming aanpassen */
          if (existing.from === toISO) api.deleteOverride(existing.id);
          else api.updateOverride(existing.id, toISO);
        } else {
          api.addOverride(pupil.id, fromISO, toISO);
        }
      };

      const pupilsFor = (date) =>
        pupilsOnDate(data.pupils, date).filter(x =>
          !filterTeacher || x.pupil.teacherId === filterTeacher
        );

      return (
        <div className="card">
          <div className="cal-toolbar">
            <button className="btn" onClick={() => setWeekStart(addDays(weekStart, -7))}>←</button>
            <button className="btn" onClick={() => setWeekStart(startOfWeek(new Date()))}>Vandaag</button>
            <button className="btn" onClick={() => setWeekStart(addDays(weekStart, 7))}>→</button>
            <span className="cal-title">{fmtRange(weekStart)}</span>
            <span className="spacer"></span>
            <select value={filterTeacher} onChange={e => setFilterTeacher(e.target.value)}>
              <option value="">Alle lesgevers</option>
              {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>

          <div className="week-grid">
            {WEEKDAYS.map((_, i) => {
              const date = addDays(weekStart, i);
              const entries = pupilsFor(date);
              return (
                <div
                  key={i}
                  className={"day-col" + (sameDay(date, today) ? " today" : "") + (dropTarget === i ? " drop-target" : "")}
                  onClick={() => openDay({ weekday: i, date, filterTeacher })}
                  onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDropTarget(i); }}
                  onDragLeave={e => { if (dropTarget === i) setDropTarget(null); }}
                  onDrop={e => onDropPupil(e, date)}
                >
                  <div className="day-head">
                    <div className="dname">{WEEKDAYS_SHORT[i]}</div>
                    <div className="dnum">{date.getDate()}</div>
                  </div>
                  <div className="day-body">
                    {entries.slice(0, 5).map(({ pupil: p, moved }) => {
                      const latest = latestAch(p);
                      return (
                        <div key={p.id} className="pupil-chip"
                          title={p.name + (latest ? " · " + levelName(latest.levelId) : "") + (moved ? " · eenmalig verplaatst" : "") + " — sleep naar een andere dag om te verplaatsen"}
                          draggable={true}
                          onDragStart={e => {
                            e.stopPropagation();
                            e.dataTransfer.effectAllowed = "move";
                            e.dataTransfer.setData("text/plain", JSON.stringify({ pupilId: p.id, fromISO: toISODate(date) }));
                          }}
                          onDragEnd={() => setDropTarget(null)}
                        >
                          <span className="dot" style={{ background: latest ? levelColor(latest.levelId) : "var(--gray-200)" }}></span>
                          <span className="pname">{moved ? "↪ " : ""}{p.name}</span>
                        </div>
                      );
                    })}
                    {entries.length > 5 && <div className="day-count">+{entries.length - 5} meer</div>}
                    {entries.length === 0 && <div className="day-count">—</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ================= Brevettenas (horizontaal, aanvinkbaar) ================= */
    function LevelAxis({ pupil, data, api, compact }) {
      const { levelColor } = useLevelHelpers(data);
      const achFor = (levelId) => pupil.achievements.find(a => a.levelId === levelId);

      /* Volgende actie = eerste niet-behaalde niveau in de volgorde */
      const nextIdx = data.levels.findIndex(l => !achFor(l.id));

      const toggle = (levelId) => {
        api.toggleAchievement(pupil.id, levelId, !!achFor(levelId));
      };

      return (
        <div className={"level-axis" + (compact ? " compact" : "")}>
          {data.levels.map((l, i) => {
            const ach = achFor(l.id);
            const isNext = i === nextIdx;
            const c = levelColor(l.id);
            const cls = "axis-step" + (ach ? " done" : isNext ? " next" : " todo");
            return (
              <div key={l.id} className={cls}>
                <button className="axis-dot"
                  style={ach ? { background: c, borderColor: c } : {}}
                  title={l.name + (ach ? " — behaald op " + fmtISO(ach.date) + " (tik om uit te vinken)" : isNext ? " — volgende stap (tik om af te vinken)" : " — nog te behalen (tik om af te vinken)")}
                  onClick={e => { e.stopPropagation(); toggle(l.id); }}>
                  {ach ? "✓" : isNext ? "→" : ""}
                </button>
                {!compact &&
                  <span className="axis-label"
                    style={ach ? { color: `color-mix(in srgb, ${c} 72%, black)`, fontWeight: 800 } : {}}>
                    {l.name}
                  </span>}
              </div>
            );
          })}
        </div>
      );
    }

    /* ================= Dagdetail: leerling-paneel ================= */
    function PupilDetail({ pupil, data, api, dateISO, moved, override }) {
      const [newComment, setNewComment] = useState("");
      const [editCommentId, setEditCommentId] = useState(null);
      const [editCommentText, setEditCommentText] = useState("");
      const [moveDate, setMoveDate] = useState(dateISO || todayISO());

      const addComment = () => {
        if (!newComment.trim()) return;
        api.addComment(pupil.id, newComment.trim());
        setNewComment("");
      };
      const startEditComment = (c) => { setEditCommentId(c.id); setEditCommentText(c.text); };
      const saveComment = () => {
        const text = editCommentText.trim();
        if (text) api.updateComment(editCommentId, text);
        setEditCommentId(null); setEditCommentText("");
      };
      const removeComment = (id) => api.deleteComment(id);

      /* Eenmalige lesdag-verplaatsing */
      const moveLesson = () => {
        if (!moveDate || moveDate === dateISO) return;
        if (moved && override) {
          if (override.from === moveDate) api.deleteOverride(override.id);
          else api.updateOverride(override.id, moveDate);
        } else {
          api.addOverride(pupil.id, dateISO, moveDate);
        }
      };
      const resetMove = () => {
        if (override) api.deleteOverride(override.id);
      };

      return (
        <div className="detail-expand" onClick={e => e.stopPropagation()}>
          {dateISO && (
            <React.Fragment>
              <h4>Lesdag (eenmalig verplaatsen)</h4>
              {moved && override && (
                <p style={{ fontSize: 12.5, fontWeight: 700, color: "var(--blue-600)", marginBottom: 6 }}>
                  ↪ Eenmalig verplaatst van {fmtISO(override.from)} naar {fmtISO(override.to)}
                </p>
              )}
              <div className="add-row">
                <input type="date" value={moveDate} onChange={e => setMoveDate(e.target.value)} />
                <button className="btn primary small" onClick={moveLesson}>↪ Verplaats deze les</button>
                {moved && override && <button className="btn small" onClick={resetMove}>↩ Terug naar vaste dag</button>}
              </div>
            </React.Fragment>
          )}

          <h4>Commentaar</h4>
          {pupil.comments.map(c => (
            <div key={c.id} className="comment-row">
              {editCommentId === c.id
                ? <React.Fragment>
                    <textarea value={editCommentText} onChange={e => setEditCommentText(e.target.value)} autoFocus />
                    <div className="comment-actions">
                      <button className="btn primary small" onClick={saveComment}>Opslaan</button>
                      <button className="btn small" onClick={() => setEditCommentId(null)}>Annuleren</button>
                    </div>
                  </React.Fragment>
                : <React.Fragment>
                    <div>{c.text}</div>
                    <div className="cdate">{fmtISO(c.date)}</div>
                    <div className="comment-actions">
                      <button className="btn small" onClick={() => startEditComment(c)}>✏️ Bewerken</button>
                      <button className="btn danger small" onClick={() => removeComment(c.id)}>🗑️ Verwijderen</button>
                    </div>
                  </React.Fragment>}
            </div>
          ))}
          <div className="add-row" style={{ marginTop: 8, flexDirection: "column", alignItems: "stretch" }}>
            <textarea placeholder="Nieuwe commentaar bij deze leerling…" value={newComment}
              onChange={e => setNewComment(e.target.value)} />
            <div><button className="btn primary small" onClick={addComment}>+ Commentaar toevoegen</button></div>
          </div>
        </div>
      );
    }

    function DayDetailModal({ detail, data, api, onClose }) {
      const [expandedId, setExpandedId] = useState(null);
      const [filterTeacher, setFilterTeacher] = useState(detail.filterTeacher || "");
      const { levelColor } = useLevelHelpers(data);

      const dateISO = toISODate(detail.date);
      const entries = pupilsOnDate(data.pupils, detail.date).filter(x =>
        !filterTeacher || x.pupil.teacherId === filterTeacher
      );
      const teacherName = (id) => (data.teachers.find(t => t.id === id) || {}).name || "—";

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <button className="btn" onClick={onClose}>✕</button>
              <h3>{WEEKDAYS[detail.weekday]} {fmtDate(detail.date)}</h3>
              <div className="sub">
                {entries.length} leerling{entries.length !== 1 ? "en" : ""} · klik op een leerling om te bewerken
              </div>
            </div>
            <div className="modal-body">
              <div className="modal-filter">
                <span>🏊</span>
                <select value={filterTeacher} onChange={e => setFilterTeacher(e.target.value)}>
                  <option value="">Alle lesgevers</option>
                  {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
              </div>
              {entries.length === 0 && <p style={{ fontSize: 14, fontWeight: 600, color: "var(--gray-600)" }}>Geen leerlingen ingepland op deze dag.</p>}
              {entries.map(({ pupil: p, moved, override }) => {
                const latest = latestAch(p);
                const expanded = expandedId === p.id;
                const accent = latest ? levelColor(latest.levelId) : "var(--gray-200)";
                return (
                  <div key={p.id} className="detail-row" style={{ borderLeft: `5px solid ${accent}` }}>
                    <div className="detail-main" onClick={() => setExpandedId(expanded ? null : p.id)}>
                      <div style={{ minWidth: 0 }}>
                        <div className="name">{p.name}</div>
                        <div className="teacher">
                          🏊 {teacherName(p.teacherId)}
                          {moved && <span className="moved-tag" title={"Eenmalig verplaatst van " + fmtISO(override.from)}> ↪ eenmalig</span>}
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                        <LevelBadge levelId={latest ? latest.levelId : null} data={data} />
                        <span className="chevron" title="Bewerken">{expanded ? "▲" : "▼"}</span>
                      </div>
                    </div>
                    <div className="row-axis" onClick={e => e.stopPropagation()}>
                      <LevelAxis pupil={p} data={data} api={api} compact={true} />
                    </div>
                    {p.comments.length > 0 && !expanded && (
                      <div className="inline-comments">
                        {p.comments.map(c => (
                          <div key={c.id} className="inline-comment">
                            💬 {c.text} <span className="cdate">({fmtISO(c.date)})</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {expanded && <PupilDetail pupil={p} data={data} api={api} dateISO={dateISO} moved={moved} override={override} />}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ================= Leerlingen ================= */
    function PupilsView({ data, api }) {
      const [name, setName] = useState("");
      const [levelId, setLevelId] = useState("");
      const [teacherId, setTeacherId] = useState("");
      const [weekday, setWeekday] = useState("");
      const [editId, setEditId] = useState(null);

      const reset = () => { setName(""); setLevelId(""); setTeacherId(""); setWeekday(""); setEditId(null); };

      const submit = () => {
        if (!name.trim()) return;
        const fields = {
          name: name.trim(),
          teacherId: teacherId || null,
          weekday: weekday === "" ? null : Number(weekday),
        };
        if (editId) api.updatePupil(editId, fields);
        else api.addPupil(fields, levelId || null);
        reset();
      };

      const edit = (p) => {
        setEditId(p.id); setName(p.name);
        setLevelId("");
        setTeacherId(p.teacherId || "");
        setWeekday(p.weekday === null || p.weekday === undefined ? "" : String(p.weekday));
      };

      const remove = (id) => {
        if (confirm("Deze leerling en alle brevetten/commentaren verwijderen?")) api.deletePupil(id);
      };

      const teacherName = (id) => (data.teachers.find(t => t.id === id) || {}).name || "—";

      return (
        <div className="card">
          <div className="manage-head"><h2>Leerlingen</h2></div>
          <div className="form-row">
            <input type="text" placeholder="Naam leerling" value={name} onChange={e => setName(e.target.value)} />
            {!editId &&
              <select value={levelId} onChange={e => setLevelId(e.target.value)}>
                <option value="">Eerste brevet (optioneel)…</option>
                {data.levels.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
              </select>}
            <select value={teacherId} onChange={e => setTeacherId(e.target.value)}>
              <option value="">Lesgever…</option>
              {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <select value={weekday} onChange={e => setWeekday(e.target.value)}>
              <option value="">Lesdag…</option>
              {WEEKDAYS.map((d, i) => <option key={i} value={i}>{d}</option>)}
            </select>
            <button className="btn primary" onClick={submit}>{editId ? "Opslaan" : "+ Toevoegen"}</button>
            {editId && <button className="btn" onClick={reset}>Annuleren</button>}
          </div>
          <p className="form-hint">
            Vink brevetten direct af op de as. Commentaar voeg je toe via het dagoverzicht in de kalender.
          </p>
          {data.pupils.length === 0
            ? <div className="empty-state"><div className="splash">🧒</div><h2>Nog geen leerlingen</h2><p>Voeg hierboven je eerste leerling toe.</p></div>
            : <div className="pupil-cards">
                {data.pupils.map(p => (
                  <div key={p.id} className="pupil-card">
                    <div className="pupil-card-head">
                      <div className="pc-info">
                        <strong>{p.name}</strong>
                        <span className="pc-meta">
                          🏊 {teacherName(p.teacherId)} · 📅 {p.weekday === null || p.weekday === undefined ? "—" : WEEKDAYS[p.weekday]} · 🎖️ {p.achievements.length}/{data.levels.length} behaald
                        </span>
                      </div>
                      <div className="pc-actions">
                        <button className="btn" onClick={() => edit(p)}>✏️</button>
                        <button className="btn danger" onClick={() => remove(p.id)}>🗑️</button>
                      </div>
                    </div>
                    <LevelAxis pupil={p} data={data} api={api} />
                    {p.comments.length > 0 && (
                      <div className="inline-comments">
                        {p.comments.map(c => (
                          <div key={c.id} className="inline-comment">💬 {c.text} <span className="cdate">({fmtISO(c.date)})</span></div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>}
        </div>
      );
    }

    /* ================= Lesgevers ================= */
    function TeachersView({ data, api }) {
      const [name, setName] = useState("");
      const add = () => {
        if (!name.trim()) return;
        api.addTeacher(name.trim());
        setName("");
      };
      const remove = (id) => {
        if (confirm("Deze lesgever verwijderen? Leerlingen blijven bestaan zonder lesgever.")) api.deleteTeacher(id);
      };
      const count = (id) => data.pupils.filter(p => p.teacherId === id).length;

      return (
        <div className="card">
          <div className="manage-head"><h2>Lesgevers</h2></div>
          <div className="form-row">
            <input type="text" placeholder="Naam lesgever" value={name}
              onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
            <button className="btn primary" onClick={add}>+ Toevoegen</button>
          </div>
          {data.teachers.length === 0
            ? <div className="empty-state"><div className="splash">🏊</div><h2>Nog geen lesgevers</h2><p>Voeg hierboven je eerste lesgever toe.</p></div>
            : <table>
                <thead><tr><th>Naam</th><th>Leerlingen</th><th></th></tr></thead>
                <tbody>
                  {data.teachers.map(t => (
                    <tr key={t.id}>
                      <td><strong>{t.name}</strong></td>
                      <td>{count(t.id)}</td>
                      <td style={{ textAlign: "right" }}>
                        <button className="btn danger" onClick={() => remove(t.id)}>🗑️</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>}
        </div>
      );
    }

    /* ================= Brevetniveaus ================= */
    function LevelsView({ data, api }) {
      const [name, setName] = useState("");
      const { levelColor } = useLevelHelpers(data);
      const add = () => {
        if (!name.trim()) return;
        const maxPos = data.levels.reduce((m, l) => Math.max(m, l.position ?? 0), -1);
        api.addLevel(name.trim(), maxPos + 1);
        setName("");
      };
      const remove = (id) => {
        if (confirm("Dit brevetniveau verwijderen? Behaalde brevetten van dit niveau verdwijnen ook.")) api.deleteLevel(id);
      };
      const move = (idx, dir) => {
        const j = idx + dir;
        if (j < 0 || j >= data.levels.length) return;
        api.swapLevels(data.levels[idx], data.levels[j]);
      };
      const count = (id) => data.pupils.filter(p => p.achievements.some(a => a.levelId === id)).length;

      return (
        <div className="card">
          <div className="manage-head"><h2>Brevetniveaus</h2></div>
          <div className="form-row">
            <input type="text" placeholder="Naam brevetniveau" value={name}
              onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
            <button className="btn primary" onClick={add}>+ Toevoegen</button>
          </div>
          <table>
            <thead><tr><th>#</th><th>Niveau</th><th>Behaald door</th><th></th></tr></thead>
            <tbody>
              {data.levels.map((l, i) => (
                <tr key={l.id}>
                  <td>{i + 1}</td>
                  <td>
                    <span className="badge" style={{
                      background: `color-mix(in srgb, ${levelColor(l.id)} 16%, white)`,
                      color: `color-mix(in srgb, ${levelColor(l.id)} 72%, black)`
                    }}>
                      <span className="dot" style={{ background: levelColor(l.id) }}></span>
                      {l.name}
                    </span>
                  </td>
                  <td>{count(l.id)}</td>
                  <td style={{ textAlign: "right", whiteSpace: "nowrap" }}>
                    <button className="btn" onClick={() => move(i, -1)}>↑</button>{" "}
                    <button className="btn" onClick={() => move(i, 1)}>↓</button>{" "}
                    <button className="btn danger" onClick={() => remove(l.id)}>🗑️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ================= Login ================= */
    function LoginView() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [busy, setBusy] = useState(false);

      const login = async (e) => {
        e.preventDefault();
        setBusy(true); setError("");
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        setBusy(false);
        if (error) setError("Inloggen mislukt. Controleer e-mail en wachtwoord.");
      };

      return (
        <div className="login-wrap">
          <div className="card login-card">
            <div className="app-logo" style={{ margin: "0 auto 12px" }}>🌊</div>
            <h2>De plons</h2>
            <p>Log in met het teamaccount om de gedeelde zwemles-data te bekijken.</p>
            <form onSubmit={login}>
              <input type="email" placeholder="E-mailadres" value={email} autoComplete="username"
                onChange={e => setEmail(e.target.value)} required />
              <input type="password" placeholder="Wachtwoord" value={password} autoComplete="current-password"
                onChange={e => setPassword(e.target.value)} required />
              {error && <p className="login-error">{error}</p>}
              <button className="btn primary" type="submit" disabled={busy}>
                {busy ? "Bezig…" : "Inloggen"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    /* ================= App ================= */
    function App() {
      const [session, setSession] = useState(undefined); // undefined = nog niet gecheckt
      const [data, setData] = useState(null);
      const [offline, setOffline] = useState(false);
      const [activeTab, setActiveTab] = useState(() => localStorage.getItem("deplons.lastTab") || "kalender");
      const [dayDetail, setDayDetail] = useState(null);

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => setSession(session));
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
        return () => subscription.unsubscribe();
      }, []);

      const refresh = async () => {
        try {
          const d = await fetchAll();
          setData(d);
          setOffline(false);
          try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch {}
        } catch (e) {
          console.warn("Data laden mislukt, val terug op cache:", e);
          try {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) setData(JSON.parse(cached));
          } catch {}
          setOffline(true);
        }
      };

      useEffect(() => {
        if (!session) return;
        refresh();
        /* Live meekijken: elke wijziging van een collega ververst de app */
        const channel = sb.channel("db-changes")
          .on("postgres_changes", { event: "*", schema: "public" }, () => refresh())
          .subscribe();
        return () => sb.removeChannel(channel);
      }, [session ? session.user.id : null]);

      useEffect(() => { localStorage.setItem("deplons.lastTab", activeTab); }, [activeTab]);

      const api = makeApi(refresh);
      const logout = () => sb.auth.signOut();

      if (session === undefined) return <div className="load-screen">🌊</div>;
      if (!session) return <LoginView />;
      if (!data) return <div className="load-screen">🌊<span>Data laden…</span></div>;

      return (
        <React.Fragment>
          <header className="app-header">
            <div className="app-logo">🌊</div>
            <div className="app-title">
              <h1>De plons</h1>
              <p>Zwemles-niveaus bijhouden{offline ? " · ⚠️ offline (alleen lezen)" : ""}</p>
            </div>
            <button className="btn logout-btn" onClick={logout} title="Uitloggen">Uitloggen</button>
            <div className="header-bubbles"></div>
            <svg className="header-wave" width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 25 Q 15 12, 30 25 T 60 25 T 90 25 T 120 25 T 150 25 T 180 25" stroke="rgba(255,255,255,0.55)" strokeWidth="3" strokeLinecap="round" fill="none"/>
              <path d="M0 34 Q 15 22, 30 34 T 60 34 T 90 34 T 120 34 T 150 34 T 180 34" stroke="rgba(255,255,255,0.3)" strokeWidth="3" strokeLinecap="round" fill="none"/>
            </svg>
          </header>

          <nav className="tab-bar">
            {TABS.map(tab => (
              <button key={tab.id}
                className={activeTab === tab.id ? "active" : ""}
                onClick={() => setActiveTab(tab.id)}>
                {tab.label}
              </button>
            ))}
          </nav>

          {activeTab === "kalender" && <CalendarView data={data} api={api} openDay={setDayDetail} />}
          {activeTab === "leerlingen" && <PupilsView data={data} api={api} />}
          {activeTab === "lesgevers" && <TeachersView data={data} api={api} />}
          {activeTab === "brevetten" && <LevelsView data={data} api={api} />}

          {dayDetail && <DayDetailModal detail={dayDetail} data={data} api={api} onClose={() => setDayDetail(null)} />}

          <footer className="app-footer">〜 De plons · v{APP_VERSION} · gedeelde data 〜</footer>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    /* PWA: service worker registreren (alleen via https of localhost) */
    if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function (err) {
          console.warn("Service worker registratie mislukt:", err);
        });
      });
    }
  </script>
</body>
</html>
